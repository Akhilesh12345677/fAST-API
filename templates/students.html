<!DOCTYPE html>
<html>

<head>
    <title>Students Data</title>
</head>

<body>
    <h2>Students List</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
        </tr>
        {% endfor %}

    </table>
</body>

</html>
